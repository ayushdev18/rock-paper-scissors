<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock paper Scissors</title>
    <link rel="stylesheet" href="app.css"/>
       
</head>
<body>
    <div class="choises" >
        <div class="choise" id="rock">
            <img src="./rock.png" />
        </div>

        <div class="choise" id="paper">
            <img src="./paper.png" />
        </div>

        <div class="choise" id="Scissors">
            <img src="./secesser.png" />
        </div>
    </div>
    <div class="score-board">
        <p id="your-score">0</p>
        <p>you</p>
    </div>
    <div class="score-board">
        <p id="com-score">0</p>
        <p>com</p>
    </div>
    <div class="msg-cantinor">
        <p id="msg">move your game</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
